<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
//Forulário normal com input e css inline
<body style="background-color: rgb(250, 215, 235);">
    <h1>Formulário</h1>
    <form >
        <label style="background-color: deeppink;" for ="Nome">Nome:</label>
        <input type="text" id="Nome" name="Nome" id="Nome" size:"50">
        <br><br>
        <label style="background-color: aqua;" for ="Sobrenome">Sobrenome:</label>
        <input type="text" id="Sobrenome" name="Sobrenome" id="Sorbenome" size:"50">
        <br><br>
        <label style="background-color: rgb(143, 143, 216);" for ="Email">Email:</label>
        <input type="email" id="Email" name="Email" id="Email" size:"50">
        <br><br>
        <label style="background-color: cornflowerblue;" for ="CPF">CPF:</label>
        <input type="text" id="CPF" name="CPF" id="CPF" size:"50">
        <br><br>
        <button style="background-color: darkcyan;">Enviar</button>
    </form>
</body>
</html>
