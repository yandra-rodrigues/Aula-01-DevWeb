<!DOCTYPE html>
<html>
<head>
<title>Cadastro</title>
<link rel="stylesheet" href="style.css">

<style>
    body {
  font-family: Arial;
  background-color: #e4e4e4;
}

.container {
  width: 400px;
  background-color: white;
  padding: 20px;
  margin: auto;
  margin-top: 80px;
  border-radius: 10px;
  box-shadow: 0px 0px 10px gray;
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background-color: green;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
}

button:hover {
  background-color: darkgreen;
}
</style>
</head>

<body>

<div class="container">

<h2>Cadastro de aluno</h2>

<form>

<label>Nome</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Telefone</label>
<input type="tel" required>

<label>Curso</label>
<select>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>PHP</option>
</select>

<button type="submit">Cadastrar</button>

</form>

</div>

</body>
</html>
